# 키워드 + 가중치 + 그룹 (REFERENCE.md §4 재편성 - 12개 그룹)
#
# 채택 여부: 제목+요약(소문자)에서 단어 경계(\b)로 매칭된 키워드의 가중치를 합산 -> relevance_score
#           relevance_score >= threshold 인 글만 채택 (threshold 우선순위: 출처 override > tier > default)
#
# 그룹(태그) 배정: 가중치와 무관하게, 매칭된 키워드가 속한 그룹을 전부 태그한다 (multi-tag).
#           즉 한 글이 여러 그룹(대시보드 탭)에 동시에 속할 수 있다.

default_threshold: 3

tier_thresholds:
  primary: 2
  trade: 3
  broad: 5

