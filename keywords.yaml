# 키워드 + 가중치 (REFERENCE.md §3~4)
#
# 매칭 규칙: 제목+요약(소문자)에서 단어 경계(\b)로 매칭 → 매칭된 가중치 합산 = relevance_score
# 채택 규칙: relevance_score >= threshold
# threshold 우선순위: sources.yaml의 소스별 override > tier_thresholds > default_threshold

default_threshold: 3

tier_thresholds:
  primary: 2
  trade: 3
  broad: 5

keywords:
  # --- GEO 핵심 ---
  generative engine optimization: 5
  answer engine optimization: 5
  llm seo: 5
  ai overview: 4
  ai overviews: 4
  ai search: 4
  ai mode: 4
  chatgpt search: 4
  cited by ai: 4
  geo: 3
  perplexity: 3
  google gemini: 2
  citation: 2

  # --- SEO 일반 ---
  core update: 4
  # 튜닝 메모: 소비자성 구글 글까지 잡는 경향 있음 - primary 소스 노이즈 보이면 2로 낮추는 것 우선 고려
  google search: 3
  serp: 3
  algorithm update: 3
  featured snippet: 3
  seo: 2
  search engine: 2
  ranking: 2
  organic traffic: 2
  structured data: 2
  schema markup: 2
